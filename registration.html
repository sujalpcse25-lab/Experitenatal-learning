<!DOCTYPE html>
<html>
<head>
  <title>Registration Page</title>
  <link rel ="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Workshop Registration</h1>
    <h1>Registration</h1>
    <p>Please fill in your details to register for the workshop.</p>
  </header>
  <nav>
    <a href="index.html">Home</a> |
    <a href="payment.html">Payment</a> |
    <a href="support.html">Support</a>
  </nav>

  <section>
    <form action="#" method="post">
      <label for="name">Full Name</label><br>
      <input type="text" id="name" name="name" placeholder="Enter your name" required><br><br>

      <label for="email">Email</label><br>
      <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

      <label for="phone">Phone</label><br>
      <input type="tel" id="phone" name="phone" placeholder="Enter your phone number"><br><br>

      <label for = "name">Father Name</label><br>
      <input type="text" id="fname" name="fname" placeholder="Enter your father name"><br><br>

      <label for = "gender">Enter sex</label>
      <select id="gender" name="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select><br><br>


      <label for="workshop">Workshop Choice</label><br>
      <select id="workshop" name="workshop">
        <option value="HTML">HTML Basics</option>
        <option value="CSS">CSS Design</option>
        <option value="JAVA">JavaScript Essentials</option>
        <option value="PYTHON">Python Programming</option>
        <option value="DATA">Data Science</option>
        <option value="AI">AI and Machine Learning</option>
      </select><br><br>

    <p>
        <marquee behavior="scroll" direction="left">
          Early registration discount available! Register now!
        </marquee>
    </p>

      <button type="submit">Submit Registration</button>
    </form>
  </section>
  <footer>
    <p>© 2026 Workshop Registration.</p>
  </footer>
</body>
<script src = "script.js"></script>
</html>
